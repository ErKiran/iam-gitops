name: Okta Drift Detection

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this drift check was triggered"
        required: false
      event_type:
        description: "Okta event type"
        required: false

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true

  TF_VAR_okta_org_name: ${{ secrets.OKTA_ORG_NAME }}
  TF_VAR_okta_base_url: ${{ secrets.OKTA_BASE_URL }}
  TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}
  TF_VAR_saml_acs_url: ${{ secrets.SAML_ACS_URL }}
  TF_VAR_saml_entity_id: ${{ secrets.SAML_ENTITY_ID }}

jobs:
  drift-detection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.6
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Show Terraform-managed resources
        run: |
          echo "Terraform-managed resources currently in state:"
          terraform state list

      - name: Terraform plan drift check
        id: plan
        run: |
          set +e

          terraform plan \
            -input=false \
            -no-color \
            -detailed-exitcode \
            -out=tfplan > plan.txt

          exit_code=$?

          set -e

          echo "exitcode=$exit_code" >> "$GITHUB_OUTPUT"
          echo "Terraform plan exit code: $exit_code"

          if [ "$exit_code" -eq 0 ]; then
            echo "No drift detected."
          elif [ "$exit_code" -eq 2 ]; then
            echo "Drift detected."
          else
            echo "Terraform plan failed."
          fi

          exit 0

      - name: Export plan JSON
        if: steps.plan.outputs.exitcode == '2'
        run: terraform show -json tfplan > plan.json

      - name: Create drift summary
        if: steps.plan.outputs.exitcode == '2'
        id: drift_summary
        run: |
          echo "Creating drift summary from Terraform plan..."

          RESOURCE_CHANGES=$(jq -r '
            .resource_changes[]
            | select(.change.actions != ["no-op"])
            | "- " + .address + " => " + (.change.actions | join(","))
          ' plan.json | head -30)

          if [ -z "$RESOURCE_CHANGES" ]; then
            RESOURCE_CHANGES="Terraform detected changes, but no resource-level summary was available."
          fi

          {
            echo "summary<<EOF"
            echo "$RESOURCE_CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload drift artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: okta-drift-plan
          path: |
            plan.txt
            plan.json
          if-no-files-found: ignore

      - name: Send Slack alert when drift is detected
        if: steps.plan.outputs.exitcode == '2'
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"IAM Drift Detected in Okta\n\nTrigger: ${{ github.event.inputs.reason }}\nOkta Event: ${{ github.event.inputs.event_type }}\nRepository: ${{ github.repository }}\nWorkflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n\nTerraform detected that Okta no longer matches the approved Git state.\n\nManaged resources with changes:\n\`\`\`${{ steps.drift_summary.outputs.summary }}\`\`\`\"
            }" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Fail workflow when drift exists
        if: steps.plan.outputs.exitcode == '2'
        run: |
          echo "Drift detected in Terraform-managed resources."
          exit 1

      - name: Fail workflow on Terraform error
        if: steps.plan.outputs.exitcode == '1'
        run: |
          echo "Terraform plan failed."
          cat plan.txt
          exit 1

      - name: No drift found
        if: steps.plan.outputs.exitcode == '0'
        run: echo "No drift detected in Terraform-managed resources."