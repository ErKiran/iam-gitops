name: Terraform Plan

on:
  pull_request:
    branches: [ "master" ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: true
  TF_VAR_okta_org_name: ${{ secrets.OKTA_ORG_NAME }}
  TF_VAR_okta_base_url: ${{ secrets.OKTA_BASE_URL }}
  TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.6

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Export plan JSON
        run: terraform show -json tfplan > plan.json

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa

      - name: Run OPA policy checks
        run: |
          opa eval \
            --data policy/okta.rego \
            --input plan.json \
            "data.okta.guardrails.deny"

          violations=$(opa eval \
            --format raw \
            --data policy/okta.rego \
            --input plan.json \
            "count(data.okta.guardrails.deny)")

          if [ "$violations" -gt 0 ]; then
            echo "OPA policy check failed. Violations found:"
            opa eval \
              --format pretty \
              --data policy/okta.rego \
              --input plan.json \
              "data.okta.guardrails.deny"
            exit 1
          fi

          echo "OPA policy check passed. No violations found."