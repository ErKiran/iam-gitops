name: Terraform Apply

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true

  # Terraform Cloud / HCP Terraform authentication
  TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}

  # Okta provider variables
  TF_VAR_okta_org_name: ${{ secrets.OKTA_ORG_NAME }}
  TF_VAR_okta_base_url: ${{ secrets.OKTA_BASE_URL }}
  TF_VAR_okta_api_token: ${{ secrets.OKTA_API_TOKEN }}
  TF_VAR_saml_acs_url: ${{ secrets.SAML_ACS_URL }}
  TF_VAR_saml_entity_id: ${{secrets.SAML_ENTITY_ID }}

  # Slack
  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.6

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -no-color -out=tfplan

      - name: Export plan JSON
        run: terraform show -json tfplan > plan.json

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa

      - name: Run OPA policy checks
        run: |
          opa eval \
            --data policy/okta.rego \
            --input plan.json \
            "data.okta.guardrails.deny"

          violations=$(opa eval \
            --format raw \
            --data policy/okta.rego \
            --input plan.json \
            "count(data.okta.guardrails.deny)")

          if [ "$violations" -gt 0 ]; then
            echo "OPA policy check failed. Violations found:"
            opa eval \
              --format pretty \
              --data policy/okta.rego \
              --input plan.json \
              "data.okta.guardrails.deny"
            exit 1
          fi

          echo "OPA policy check passed. No violations found."

      - name: Terraform apply
        id: terraform_apply
        run: |
          set -o pipefail
          terraform apply -input=false -auto-approve -no-color tfplan | tee apply_output.txt

      - name: Create deployment summary
        id: deployment_summary
        run: |
          APPLY_SUMMARY=$(grep -E "Apply complete! Resources:" apply_output.txt || true)

          if [ -z "$APPLY_SUMMARY" ]; then
            APPLY_SUMMARY="Terraform apply completed, but no resource summary was found."
          fi

          {
            echo "summary<<EOF"
            echo "$APPLY_SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"✅ *IAM Terraform deployment completed*\n\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Actor:* ${{ github.actor }}\n*Summary:* ${{ steps.deployment_summary.outputs.summary }}\n\nOPA guardrails passed and Terraform changes were deployed.\"
            }" \
            "$SLACK_WEBHOOK_URL"

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{
              \"text\": \"❌ *IAM Terraform deployment failed*\n\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Commit:* ${{ github.sha }}\n*Actor:* ${{ github.actor }}\n\nCheck the GitHub Actions logs for Terraform or OPA failure details.\"
            }" \
            "$SLACK_WEBHOOK_URL"